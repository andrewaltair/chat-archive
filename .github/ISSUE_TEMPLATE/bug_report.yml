name: Bug report
description: Something in Claude Chat Archive is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did and what went wrong.
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code version
      placeholder: "1.97.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / errors
      description: Anything from Help → Toggle Developer Tools → Console, if relevant.
